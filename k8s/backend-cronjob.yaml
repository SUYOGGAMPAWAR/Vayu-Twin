apiVersion: batch/v1
kind: CronJob
metadata:
  name: vayutwin-pipeline
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: data-ingestion
            image: vayutwin-backend:latest
            imagePullPolicy: Never
          restartPolicy: OnFailure
